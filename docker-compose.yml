services:
  # Webサーバー (Nginx)
  app-nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./src-laravel:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-php

  # Laravel用サーバー (PHP)
  app-php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    volumes:
      - ./src-laravel:/var/www/html
    environment:
      DB_HOST: app-mysql
      DB_DATABASE: watch_db
      DB_USERNAME: user
      DB_PASSWORD: password

  # スクレイピング用 (Go)
  app-go:
    build:
      context: .
      dockerfile: ./docker/go/Dockerfile
    volumes:
      - ./src-go:/app
      - go-modules:/go/pkg/mod
    tty: true

  # データベース (MySQL)
  app-mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: watch_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
volumes:
  go-modules:
